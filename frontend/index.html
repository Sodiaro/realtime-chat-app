<!doctype html>
<html lang="en" data-theme="devdark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1015" />
    <title>DevChat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- apply the saved/system theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("devchat-theme") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var theme = dark ? "devdark" : "devlight";
          document.documentElement.setAttribute("data-theme", theme);
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute("content", dark ? "#0e1015" : "#ffffff");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
